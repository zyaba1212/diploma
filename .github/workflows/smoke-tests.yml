name: Smoke Tests (Manual)

on:
  workflow_dispatch:

jobs:
  proposals-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diploma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d diploma"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/diploma?schema=public
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: Start Next.js app
        run: npm run dev -- --hostname 0.0.0.0 --port 3000 > dev.log 2>&1 &

      - name: Wait for health endpoint
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS "http://localhost:3000/api/health" > /dev/null; then
              echo "Health endpoint is up"
              exit 0
            fi
            sleep 2
          done
          echo "Health endpoint did not become ready in time"
          exit 1

      - name: Run proposals smoke tests
        run: |
          npm run test:proposals
          npm run test:proposals-submit
          npm run test:proposals-stage7
          npm run test:proposals-stage8
