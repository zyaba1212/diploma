name: Import dump.sql to Supabase

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Import full SQL dump
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          test -n "$SUPABASE_HOST" || (echo "Missing SUPABASE_HOST secret" && exit 1)
          test -n "$SUPABASE_PORT" || (echo "Missing SUPABASE_PORT secret" && exit 1)
          test -n "$SUPABASE_USER" || (echo "Missing SUPABASE_USER secret" && exit 1)
          test -n "$SUPABASE_DB" || (echo "Missing SUPABASE_DB secret" && exit 1)
          test -n "$PGPASSWORD" || (echo "Missing SUPABASE_PASSWORD secret" && exit 1)
          psql \
            -h "$SUPABASE_HOST" \
            -p "$SUPABASE_PORT" \
            -U "$SUPABASE_USER" \
            -d "$SUPABASE_DB" \
            -v ON_ERROR_STOP=1 \
            -f db-export/diploma.sql